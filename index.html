<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCP Java SE 21</title>

    <!-- Fonts: Merriweather (serif headings), Inter (sans body),
         JetBrains Mono (code), Noto Sans Bengali (Bengali UI text). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Bengali:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ===== Header ===== -->
    <header class="site-header">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 6.5C10.4 5.2 8.3 4.7 5.8 5c-.9.1-1.8.3-1.8.3v13s.9-.2 1.8-.3c2.5-.3 4.6.2 6.2 1.5 1.6-1.3 3.7-1.8 6.2-1.5.9.1 1.8.3 1.8.3v-13s-.9-.2-1.8-.3c-2.5-.3-4.6.2-6.2 1.5z" />
            <path d="M12 6.5v12" />
          </svg>
        </span>
        <h1 class="brand-title">OCP Java SE 21</h1>
        <p class="brand-subtitle">সার্টিফিকেশন প্রস্তুতি · স্টাডি রিডার</p>
      </div>

      <div class="header-actions">
        <a
          class="icon-btn"
          id="link-github"
          href="https://github.com/"
          target="_blank"
          rel="noopener"
          title="GitHub"
          aria-label="GitHub"
        >
          <svg width="17" height="17" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 014 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z" />
          </svg>
        </a>
        <a
          class="icon-btn"
          id="link-linkedin"
          href="https://www.linkedin.com/"
          target="_blank"
          rel="noopener"
          title="LinkedIn"
          aria-label="LinkedIn"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.07 2.07 0 110-4.14 2.07 2.07 0 010 4.14zM7.12 20.45H3.55V9h3.57v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z" />
          </svg>
        </a>
        <button
          class="icon-btn"
          id="theme-toggle"
          type="button"
          title="Toggle theme"
          aria-label="Toggle light/dark theme"
        >
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
          </svg>
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ===== Body: sidebar + reading area ===== -->
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <p class="sidebar-label">CHAPTERS · অধ্যায়</p>
        <nav class="chapter-nav" id="chapter-nav" aria-label="Chapters">
          <!-- chapter buttons injected by script.js -->
        </nav>
      </aside>

      <!-- Reading area: a fixed tab bar above a scrolling content region -->
      <main class="reading">
        <div class="reading-head">
          <div class="reading-inner">
            <div class="tabs" id="view-tabs" role="tablist" aria-label="Content views">
              <!-- tabs injected by script.js -->
            </div>
          </div>
        </div>

        <div class="reading-scroll" id="reading-scroll">
          <div class="reading-inner">
            <p class="breadcrumb" id="breadcrumb"></p>

            <article class="reading-content" id="reading-content" aria-live="polite">
              <!-- view injected here -->
            </article>
          </div>
        </div>
      </main>
    </div>

    <!-- ===== Footer ===== -->
    <footer class="site-footer">
      <span class="footer-credit"
        >মূল বই · Original Book — <a href="https://www.amazon.com/Oracle-Certified-Professional-Developer-Study/dp/1394286619">OCP Oracle Certified Professional Java SE 21 Developer Study Guide</a></span
      >
      <span class="footer-meta">
        <span id="page-indicator" class="page-indicator"></span>
        <span class="footer-copy"> · Built by <a href="https://mdruhulkuddus.github.io/">Ruhul Kuddus</a> · © 2026</span>
      </span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
